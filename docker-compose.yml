version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: precedentia-cache
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: precedentia-vectors
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: